name: Cadenza
options:
  bundleIdPrefix: com.cadenza
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  Cadenza:
    type: application
    platform: iOS
    sources:
      - Cadenza
    dependencies:
      - target: CadenzaLiveActivity
        embed: true
    configFiles:
      Debug: Cadenza.xcconfig
      Release: Cadenza.xcconfig
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        INFOPLIST_FILE: Cadenza/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jy.cadenza
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
  CadenzaLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - CadenzaLiveActivity
      - path: Cadenza/Models/CadenzaActivityAttributes.swift
      - path: Cadenza/Utilities/Constants.swift
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: CadenzaLiveActivity/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jy.cadenza.LiveActivity
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SKIP_INSTALL: YES
  CadenzaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: Cadenza
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.jy.cadenzaTests
